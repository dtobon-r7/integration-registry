spring:
  application:
    name: integration-registry
  threads:
    virtual:
      enabled: true   # ADR-002: blocking RestClient adapters are dispatched in parallel by the
                      # FanOutCoordinator; virtual threads make those blocking calls truly concurrent.
  data:
    redis:
      host: ${REGISTRY_VALKEY_HOST:localhost}
      port: ${REGISTRY_VALKEY_PORT:6379}
      timeout: 250ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState,bundleLoad

integration-registry:
  cache:
    fresh-ttl: 5m
    stale-ttl: 24h
  coordinator:
    total-deadline: 20s
    default-per-adapter-timeout: 10s
    per-adapter-timeout:
      InsightConnect: 5s
      InsightIDR: 15s
  vendor-mapping:
    cache-dir: ${java.io.tmpdir}/integration-registry/vendor-mapping
    # bundle-version, s3-bucket, s3-key-prefix come from the deploy environment.
    # Absent here so missing config fails fast at property binding (no stale defaults).
  insightconnect:
    # base-url and icon-base come from the deploy environment (no defaults —
    # absent config fails fast at binding).
    timeout: 5s
  insightidr:
    # base-url (CMS event-sources API) and idr-base (configuration_url deep-link base) come from
    # the deploy environment (no defaults — absent config fails fast at binding).
    timeout: 15s              # search / per-adapter (RFC-001 §Fan-out starting point)
    detail-timeout: 2s        # per-detail-call (RFC-001 §Fan-out starting point)
    staleness-threshold: 24h  # lastActive older than this -> missing_data
    detail-concurrency: 60    # bounded detail-fetch pool (RFC-001 §Fan-out starting point)

---
spring:
  config:
    activate:
      on-profile: local

---
spring:
  config:
    activate:
      on-profile: staging

---
spring:
  config:
    activate:
      on-profile: production
