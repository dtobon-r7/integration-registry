# Note: `display_name` fields are required by the JSON Schema (v1) for human
# readability of the bundle source, but the parser does not propagate them
# into VendorResolution — that responsibility lives at presentation layers.
apiVersion: registry.rapid7.com/v1
kind: VendorMapping
metadata:
  mapping_version: v1.0.0
spec:
  vendors:
    - id: microsoft
      name: Microsoft
      services:
        - id: microsoft-defender
          name: Microsoft Defender
          category: edr
          data_sources:
            - product: InsightIDR
              source_type: product_type
              source_value: microsoft-defender-endpoint
              display_name: Microsoft Defender for Endpoint
            - product: InsightConnect
              source_type: plugin_name
              source_value: microsoft-defender
              display_name: Microsoft Defender
    - id: atlassian
      name: Atlassian
      services:
        - id: jira
          name: Jira
          category: itsm
          data_sources:
            - product: InsightConnect
              source_type: plugin_name
              source_value: jira
              display_name: Jira
