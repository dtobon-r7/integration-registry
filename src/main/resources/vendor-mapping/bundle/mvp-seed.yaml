# yaml-language-server: $schema=../schema/v1.json
# Note: `display_name` fields are required by the JSON Schema (v1). The parser
# propagates each one into the snapshot via DataSourceResolution (identity +
# displayName); the aggregator surfaces it as the expanded data-source row label.
# Note: for InsightConnect (`source_type: plugin_name`) the `source_value` is
# komand's canonical plugin slug — the `plugin.slugName` field on the Class 3
# connections response (e.g. `rapid7_insightconnect_jira`), NOT the display
# title `plugin.name` ("Jira"). The InsightConnectAdapter emits the slug.
apiVersion: registry.rapid7.com/v1
kind: VendorMapping
metadata:
  mapping_version: v1.0.0
spec:
  vendors:
    - id: microsoft
      name: Microsoft
      services:
        - id: microsoft-defender
          name: Microsoft Defender
          category: edr
          data_sources:
            - product: InsightIDR
              source_type: product_type
              source_value: microsoft-defender-endpoint
              display_name: Microsoft Defender for Endpoint
            - product: InsightConnect
              source_type: plugin_name
              source_value: rapid7_insightconnect_microsoft_defender
              display_name: Microsoft Defender
    - id: atlassian
      name: Atlassian
      services:
        - id: jira
          name: Jira
          category: itsm
          data_sources:
            - product: InsightConnect
              source_type: plugin_name
              source_value: rapid7_insightconnect_jira
              display_name: Jira
